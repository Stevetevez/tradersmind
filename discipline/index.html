<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#f4f6f8">
<title>Discipline Tracker 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root {
  --green:#1a9e6e;--green-light:#22c48a;--green-dim:rgba(26,158,110,0.13);--green-glow:rgba(26,158,110,0.06);
  --bg:#f0f4f2;--card:#ffffff;--card2:#e8f0ec;--border:#d0ddd5;--border2:#bccec4;
  --text:#0f1f17;--muted:#4a6859;--muted2:#9ab8a8;
  --red:#d94040;--red-dim:rgba(217,64,64,0.10);
  --shadow:0 2px 8px rgba(15,31,23,0.08),0 1px 2px rgba(15,31,23,0.04);
  --shadow-lg:0 4px 20px rgba(15,31,23,0.10);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{min-height:100%;background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;-webkit-font-smoothing:antialiased;}

/* ── AUTH ── */
#auth-screen{position:fixed;inset:0;z-index:100;display:flex;align-items:center;justify-content:center;background:var(--bg);}
.auth-card{background:var(--card);border:1.5px solid var(--border2);border-radius:20px;padding:52px 40px;text-align:center;width:380px;box-shadow:var(--shadow-lg);}
.auth-logo{font-size:32px;font-weight:900;color:var(--text);margin-bottom:6px;letter-spacing:-0.5px;}
.auth-logo span{color:var(--green);}
.auth-sub{font-size:13px;font-weight:600;color:var(--muted);margin-bottom:6px;text-transform:uppercase;letter-spacing:1px;}
.auth-year{font-size:11px;font-weight:700;letter-spacing:2px;color:var(--green);text-transform:uppercase;margin-bottom:36px;background:var(--green-dim);border:1px solid rgba(26,158,110,0.25);display:inline-block;padding:5px 16px;border-radius:20px;}
.google-btn{display:flex;align-items:center;justify-content:center;gap:10px;width:100%;padding:16px 20px;background:var(--card2);border:1.5px solid var(--border2);border-radius:12px;color:var(--text);font-family:'Inter',sans-serif;font-size:15px;font-weight:700;cursor:pointer;transition:all .2s;}
.google-btn:hover{border-color:var(--green);background:var(--green-glow);}
.google-btn svg{width:20px;height:20px;}

/* ── APP ── */
#app{display:none;}

/* ── HEADER ── */
.header{background:var(--card);border-bottom:2px solid var(--border2);padding:0 28px;height:68px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;box-shadow:0 2px 12px rgba(15,31,23,0.07);}
.header-left{display:flex;align-items:center;gap:14px;}
.header-logo{font-size:22px;font-weight:900;color:var(--text);letter-spacing:-0.5px;}
.header-logo span{color:var(--green);}
.header-badge{font-size:10px;font-weight:800;letter-spacing:1.5px;color:var(--green);border:1.5px solid var(--green-dim);padding:5px 12px;border-radius:20px;text-transform:uppercase;background:var(--green-glow);}
.header-right{display:flex;align-items:center;gap:12px;}
.view-toggle{display:flex;background:var(--card2);border:1.5px solid var(--border2);border-radius:10px;overflow:hidden;}
.view-btn{padding:8px 18px;font-family:'Inter',sans-serif;font-size:12px;font-weight:700;letter-spacing:0.5px;color:var(--muted);background:none;border:none;cursor:pointer;transition:all .15s;text-transform:uppercase;}
.view-btn.active{background:var(--card);color:var(--green);box-shadow:var(--shadow);}
.user-avatar{width:36px;height:36px;border-radius:50%;background:var(--green-dim);border:2px solid rgba(26,158,110,0.3);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;color:var(--green);cursor:pointer;overflow:hidden;}
.user-avatar img{width:100%;height:100%;object-fit:cover;}
.sign-out-btn{font-size:12px;font-weight:600;color:var(--muted);background:none;border:none;cursor:pointer;transition:color .15s;}
.sign-out-btn:hover{color:var(--red);}

/* ── STATS BAR ── */
.stats-bar{display:grid;grid-template-columns:repeat(5,1fr);background:var(--card);border-bottom:2px solid var(--border2);}
.stat-cell{padding:18px 16px;text-align:center;border-right:1px solid var(--border);}
.stat-cell:last-child{border-right:none;}
.stat-val{font-size:30px;font-weight:900;color:var(--text);line-height:1;margin-bottom:4px;letter-spacing:-1px;}
.stat-val.green{color:var(--green);}
.stat-val.red{color:var(--red);}
.stat-lbl{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:1px;}

/* ── MAIN ── */
.main{padding:28px;}

/* ── MONTH SECTION ── */
.month-section{margin-bottom:32px;}
.month-head{display:flex;align-items:center;gap:14px;margin-bottom:12px;}
.month-name{font-size:18px;font-weight:900;color:var(--text);white-space:nowrap;text-transform:uppercase;letter-spacing:1px;}
.month-name span{color:var(--green);}
.month-line{flex:1;height:2px;background:var(--border2);border-radius:2px;}
.month-score{font-size:11px;font-weight:700;color:var(--muted);white-space:nowrap;text-transform:uppercase;letter-spacing:0.5px;}

/* WEEKDAY LABELS */
.week-labels{display:grid;grid-template-columns:repeat(5,1fr);gap:5px;margin-bottom:5px;}
.week-lbl{font-size:11px;font-weight:800;color:var(--muted2);text-align:center;text-transform:uppercase;letter-spacing:1px;}

/* DAY GRID */
.days-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:5px;}
.day-cell{background:var(--card);border:1.5px solid var(--border);border-radius:12px;padding:10px 9px 9px;min-height:90px;display:flex;flex-direction:column;gap:7px;transition:border-color .15s,box-shadow .15s;position:relative;box-shadow:0 1px 4px rgba(15,31,23,0.05);}
.day-cell:hover{border-color:var(--border2);box-shadow:var(--shadow);}
.day-cell.today{border-color:var(--green);border-width:2px;}
.day-cell.today .day-num{color:var(--green);}
.day-cell.all-good{border-color:rgba(26,158,110,0.4);background:rgba(26,158,110,0.04);}
.day-cell.has-fail{border-color:rgba(217,64,64,0.3);background:rgba(217,64,64,0.03);}
.day-num{font-size:14px;font-weight:800;color:var(--muted);letter-spacing:0.5px;}
.today-pip{position:absolute;top:8px;right:8px;width:6px;height:6px;border-radius:50%;background:var(--green);}
.checks-col{display:flex;flex-direction:column;gap:6px;}
.check-row{display:flex;align-items:center;gap:7px;cursor:pointer;user-select:none;}
.check-dot{width:22px;height:22px;border-radius:50%;border:2px solid var(--border2);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s;}
.check-dot.done{background:var(--green);border-color:var(--green);}
.check-dot.fail{background:var(--red);border-color:var(--red);}
.check-dot svg{width:11px;height:11px;}
.check-txt{font-size:10px;font-weight:700;color:var(--muted);letter-spacing:0.2px;line-height:1.2;text-transform:uppercase;}

/* ── LIST VIEW ── */
#list-view{display:none;}
.list-month{margin-bottom:24px;}
.list-month-head{display:flex;align-items:center;justify-content:space-between;padding:12px 0 10px;border-bottom:2.5px solid var(--border2);margin-bottom:2px;}
.list-month-name{font-size:18px;font-weight:900;color:var(--text);text-transform:uppercase;letter-spacing:1px;}
.list-month-name span{color:var(--green);}
.list-month-score{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:0.5px;}
.list-row{display:grid;grid-template-columns:100px 1fr 1fr 80px;align-items:center;padding:11px 8px;border-bottom:1px solid var(--border);gap:12px;border-radius:8px;transition:background .1s;}
.list-row:hover{background:var(--card2);}
.list-date{font-size:13px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:0.5px;}
.list-date.today-date{color:var(--green);}
.list-check{display:flex;align-items:center;gap:9px;cursor:pointer;user-select:none;}
.list-dot{width:24px;height:24px;border-radius:50%;border:2px solid var(--border2);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s;}
.list-dot.done{background:var(--green);border-color:var(--green);}
.list-dot.fail{background:var(--red);border-color:var(--red);}
.list-dot svg{width:12px;height:12px;}
.list-check-lbl{font-size:13px;font-weight:700;color:var(--text);}
.list-badge{font-size:10px;font-weight:800;padding:4px 10px;border-radius:20px;text-align:center;text-transform:uppercase;letter-spacing:0.5px;}
.list-badge.perfect{background:var(--green-dim);color:var(--green);border:1.5px solid rgba(26,158,110,0.25);}
.list-badge.fail{background:var(--red-dim);color:var(--red);}
.list-badge.partial{background:var(--green-glow);color:var(--green);border:1.5px solid rgba(26,158,110,0.2);}
.list-badge.empty{color:var(--muted2);font-weight:600;}

/* ── COLLAPSIBLE MONTHS ── */
.month-head{cursor:pointer;user-select:none;}
.month-head:hover .month-name{color:var(--green);}
.month-toggle{width:24px;height:24px;border-radius:6px;background:var(--card2);border:1.5px solid var(--border2);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .2s;}
.month-toggle svg{transition:transform .25s;color:var(--muted);}
.month-collapsed .month-toggle svg{transform:rotate(-90deg);}
.month-collapsed .month-toggle{background:var(--green-dim);border-color:rgba(26,158,110,0.3);}
.month-body{overflow:hidden;transition:opacity .2s;}
.month-collapsed .month-body{display:none;}
.month-collapsed .month-name{color:var(--muted);}

/* ── LOADING ── */
#loading{position:fixed;inset:0;z-index:200;background:var(--bg);display:flex;align-items:center;justify-content:center;flex-direction:column;gap:16px;}
.load-logo{font-size:28px;font-weight:900;color:var(--text);letter-spacing:-0.5px;}
.load-logo span{color:var(--green);}
.load-sub{font-size:11px;font-weight:700;letter-spacing:2px;color:var(--muted);text-transform:uppercase;}
.load-dots{display:flex;gap:7px;}
.load-dot{width:7px;height:7px;border-radius:50%;background:var(--green);animation:pulse 1.2s ease-in-out infinite;}
.load-dot:nth-child(2){animation-delay:.2s;}
.load-dot:nth-child(3){animation-delay:.4s;}
@keyframes pulse{0%,100%{opacity:.2;transform:scale(.8);}50%{opacity:1;transform:scale(1);}}

/* ── TOAST ── */
.toast{position:fixed;bottom:24px;right:24px;z-index:999;background:var(--text);border-radius:10px;padding:12px 20px;font-size:13px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:#fff;opacity:0;transform:translateY(8px);transition:all .25s;pointer-events:none;}
.toast.show{opacity:1;transform:translateY(0);}
</style>
</head>
<body>

<div id="loading">
  <div class="load-logo">Trader<span>Mind</span></div>
  <div class="load-sub">Discipline Tracker</div>
  <div class="load-dots">
    <div class="load-dot"></div>
    <div class="load-dot"></div>
    <div class="load-dot"></div>
  </div>
</div>

<div id="auth-screen" style="display:none">
  <div class="auth-card">
    <div class="auth-logo">Trader<span>Mind</span></div>
    <div class="auth-sub">Challenge Account</div>
    <div class="auth-year">Discipline Tracker 2026</div>
    <button class="google-btn" onclick="signInWithGoogle()">
      <svg viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
      Sign in with Google
    </button>
  </div>
</div>

<div id="app">
  <div class="header">
    <div class="header-left">
      <div class="header-logo">Trader<span>Mind</span></div>
      <div class="header-badge">Discipline 2026</div>
    </div>
    <div class="header-right">
      <div class="view-toggle">
        <button class="view-btn active" id="btn-cal" onclick="switchView('calendar')">Calendar</button>
        <button class="view-btn" id="btn-list" onclick="switchView('list')">List</button>
      </div>
      <div class="user-avatar" id="user-avatar">S</div>
      <button class="sign-out-btn" onclick="signOut()">Sign out</button>
    </div>
  </div>

  <div class="stats-bar">
    <div class="stat-cell">
      <div class="stat-val" id="s-total">—</div>
      <div class="stat-lbl">Days Marked</div>
    </div>
    <div class="stat-cell">
      <div class="stat-val green" id="s-perfect">—</div>
      <div class="stat-lbl">Perfect Days</div>
    </div>
    <div class="stat-cell">
      <div class="stat-val" id="s-rate">—</div>
      <div class="stat-lbl">Discipline %</div>
    </div>
    <div class="stat-cell">
      <div class="stat-val" id="s-streak">—</div>
      <div class="stat-lbl">Best Streak</div>
    </div>
    <div class="stat-cell">
      <div class="stat-val red" id="s-fails">—</div>
      <div class="stat-lbl">Failed Days</div>
    </div>
  </div>

  <div class="main">
    <div id="calendar-view"></div>
    <div id="list-view"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged, signOut as fbSignOut } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';
import { getFirestore, doc, getDoc, setDoc } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

const firebaseConfig = {
  apiKey: "AIzaSyD3IcuhzPplUZq9pQQp_im17HNMVbHn7XU",
  authDomain: "tradermind-a1141.firebaseapp.com",
  projectId: "tradermind-a1141",
  storageBucket: "tradermind-a1141.firebasestorage.app",
  messagingSenderId: "289972617651",
  appId: "1:289972617651:web:cd8cc63c3d4305bfe04bc6"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);
const provider = new GoogleAuthProvider();

const CHECKS = [
  { id: 'rules', label: 'Rules followed' },
  { id: 'trades', label: '≤2 trades/day' }
];
const WEEKDAYS = ['Mon','Tue','Wed','Thu','Fri'];
const MONTH_NAMES = ['January','February','March','April','May','June','July','August','September','October','November','December'];

let state = {};
let currentUser = null;
let currentView = 'calendar';
let collapsedMonths = new Set(JSON.parse(localStorage.getItem('dt_collapsed') || '[]'));

function buildTradingDays() {
  const days = [];
  for (let d = new Date(2026,0,1); d <= new Date(2026,11,31); d.setDate(d.getDate()+1)) {
    const dow = d.getDay();
    if (dow >= 1 && dow <= 5) {
      days.push({ year:d.getFullYear(), month:d.getMonth(), date:d.getDate(), dow, key:`${d.getFullYear()}-${d.getMonth()}-${d.getDate()}` });
    }
  }
  return days;
}

const allDays = buildTradingDays();

function groupByMonth(days) {
  const months = {};
  days.forEach(d => {
    const mk = `${d.year}-${d.month}`;
    if (!months[mk]) months[mk] = { year:d.year, month:d.month, days:[] };
    months[mk].days.push(d);
  });
  return Object.values(months);
}

function todayKey() {
  const t = new Date();
  return `${t.getFullYear()}-${t.getMonth()}-${t.getDate()}`;
}

async function loadState() {
  const snap = await getDoc(doc(db,'discipline2026',currentUser.uid));
  state = snap.exists() ? (snap.data().days || {}) : {};
}

async function saveState() {
  await setDoc(doc(db,'discipline2026',currentUser.uid), { days:state, updatedAt:new Date().toISOString() }, { merge:true });
}

async function cycleCheck(key, checkId) {
  if (!state[key]) state[key] = {};
  const cur = state[key][checkId];
  if (!cur) state[key][checkId] = 'done';
  else if (cur === 'done') state[key][checkId] = 'fail';
  else delete state[key][checkId];
  renderAll();
  await saveState();
  const v = state[key]?.[checkId];
  showToast(v === 'done' ? '✓ Disciplined' : v === 'fail' ? '✗ Failed' : 'Cleared');
}

function toggleMonth(mk) {
  if (collapsedMonths.has(mk)) collapsedMonths.delete(mk);
  else collapsedMonths.add(mk);
  localStorage.setItem('dt_collapsed', JSON.stringify([...collapsedMonths]));
  renderAll();
}

function computeStats() {
  let total=0, perfect=0, fails=0, best=0, cur=0;
  allDays.forEach(d => {
    const s = state[d.key];
    if (!s || !Object.keys(s).length) return;
    total++;
    const allDone = CHECKS.every(c => s[c.id]==='done');
    const anyFail = CHECKS.some(c => s[c.id]==='fail');
    if (allDone) { perfect++; cur++; best=Math.max(best,cur); }
    else { if(anyFail) fails++; cur=0; }
  });
  return { total, perfect, fails, streak:best, rate:total?Math.round(perfect/total*100):0 };
}

function renderStats() {
  const s = computeStats();
  document.getElementById('s-total').textContent = s.total;
  document.getElementById('s-perfect').textContent = s.perfect;
  document.getElementById('s-rate').textContent = s.rate+'%';
  document.getElementById('s-streak').textContent = s.streak;
  document.getElementById('s-fails').textContent = s.fails;
}

function dotSVG(st) {
  if (st==='done') return `<svg viewBox="0 0 10 10" fill="none"><polyline points="1.5,5 4,7.5 8.5,2.5" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
  if (st==='fail') return `<svg viewBox="0 0 10 10" fill="none"><line x1="2" y1="2" x2="8" y2="8" stroke="white" stroke-width="2" stroke-linecap="round"/><line x1="8" y1="2" x2="2" y2="8" stroke="white" stroke-width="2" stroke-linecap="round"/></svg>`;
  return '';
}

function renderCalendar() {
  const tk = todayKey();
  let html = '';
  groupByMonth(allDays).forEach(mo => {
    const mk = `${mo.year}-${mo.month}`;
    const isCollapsed = collapsedMonths.has(mk);
    const marked = mo.days.filter(d => state[d.key] && Object.keys(state[d.key]).length);
    const perfect = marked.filter(d => CHECKS.every(c => (state[d.key]||{})[c.id]==='done'));
    const scoreStr = marked.length ? `${perfect.length}/${marked.length} perfect` : '';
    const mName = MONTH_NAMES[mo.month].toUpperCase();
    const chevron = `<svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="2,4 6,8 10,4"/></svg>`;

    html += `<div class="month-section${isCollapsed?' month-collapsed':''}">
      <div class="month-head" onclick="window._toggleMonth('${mk}')">
        <div class="month-name">${mName} <span>${mo.year}</span></div>
        <div class="month-line"></div>
        <div class="month-score">${scoreStr}</div>
        <div class="month-toggle">${chevron}</div>
      </div>
      <div class="month-body">
        <div class="week-labels">${WEEKDAYS.map(w=>`<div class="week-lbl">${w}</div>`).join('')}</div>
        <div class="days-grid">`;

    for (let i=1; i<mo.days[0].dow; i++) html += `<div></div>`;

    mo.days.forEach(d => {
      const s = state[d.key]||{};
      const isToday = d.key===tk;
      const allDone = CHECKS.every(c => s[c.id]==='done');
      const anyFail = CHECKS.some(c => s[c.id]==='fail');
      let cls = 'day-cell';
      if(isToday) cls+=' today';
      else if(allDone) cls+=' all-good';
      else if(anyFail) cls+=' has-fail';

      html += `<div class="${cls}">
        <div class="day-num">${String(d.date).padStart(2,'0')}</div>
        ${isToday?'<div class="today-pip"></div>':''}
        <div class="checks-col">`;

      CHECKS.forEach(c => {
        const st = s[c.id];
        html += `<div class="check-row" onclick="event.stopPropagation();window._cycle('${d.key}','${c.id}')">
          <div class="check-dot${st?' '+st:''}">${dotSVG(st)}</div>
          <div class="check-txt">${c.label}</div>
        </div>`;
      });

      html += `</div></div>`;
    });

    html += `</div></div></div>`;
  });

  document.getElementById('calendar-view').innerHTML = html;
}

function renderList() {
  const tk = todayKey();
  let html = '';
  groupByMonth(allDays).forEach(mo => {
    const marked = mo.days.filter(d => state[d.key] && Object.keys(state[d.key]).length);
    const perfect = marked.filter(d => CHECKS.every(c => (state[d.key]||{})[c.id]==='done'));
    const scoreStr = marked.length ? `${perfect.length}/${marked.length} perfect` : '';
    const mName = MONTH_NAMES[mo.month].toUpperCase();

    const mk = `${mo.year}-${mo.month}`;
    const isCollapsed = collapsedMonths.has(mk);
    const chevron = `<svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="2,4 6,8 10,4"/></svg>`;

    html += `<div class="list-month${isCollapsed?' month-collapsed':''}">
      <div class="list-month-head month-head" onclick="window._toggleMonth('${mk}')">
        <div class="list-month-name">${mName} <span>${mo.year}</span></div>
        <div style="display:flex;align-items:center;gap:10px;">
          <div class="list-month-score">${scoreStr}</div>
          <div class="month-toggle">${chevron}</div>
        </div>
      </div>
      <div class="month-body">`;

    mo.days.forEach(d => {
      const s = state[d.key]||{};
      const isToday = d.key===tk;
      const allDone = CHECKS.every(c => s[c.id]==='done');
      const anyFail = CHECKS.some(c => s[c.id]==='fail');
      const anyMarked = CHECKS.some(c => s[c.id]);
      const dateLabel = `${WEEKDAYS[d.dow-1]} ${String(d.date).padStart(2,'0')}`;

      let badge = '';
      if(anyMarked) {
        if(allDone) badge = `<span class="list-badge perfect">Perfect</span>`;
        else if(anyFail) badge = `<span class="list-badge fail">Failed</span>`;
        else badge = `<span class="list-badge partial">Partial</span>`;
      } else {
        badge = `<span class="list-badge empty">—</span>`;
      }

      html += `<div class="list-row">
        <div class="list-date${isToday?' today-date':''}">${dateLabel}</div>`;

      CHECKS.forEach(c => {
        const st = s[c.id];
        html += `<div class="list-check" onclick="window._cycle('${d.key}','${c.id}')">
          <div class="list-dot${st?' '+st:''}">${dotSVG(st)}</div>
          <div class="list-check-lbl">${c.label}</div>
        </div>`;
      });

      html += `${badge}</div>`;
    });

    html += `</div></div>`;
  });

  document.getElementById('list-view').innerHTML = html;
}

function renderAll() {
  renderStats();
  if (currentView==='calendar') renderCalendar();
  else renderList();
}

window.switchView = function(v) {
  currentView = v;
  document.getElementById('btn-cal').classList.toggle('active', v==='calendar');
  document.getElementById('btn-list').classList.toggle('active', v==='list');
  document.getElementById('calendar-view').style.display = v==='calendar'?'block':'none';
  document.getElementById('list-view').style.display = v==='list'?'block':'none';
  renderAll();
};

window._cycle = (key, checkId) => cycleCheck(key, checkId);
window._toggleMonth = (mk) => toggleMonth(mk);

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 1800);
}

window.signInWithGoogle = async () => {
  try { await signInWithPopup(auth, provider); }
  catch(e) { console.error(e); }
};

window.signOut = async () => { await fbSignOut(auth); };

onAuthStateChanged(auth, async user => {
  document.getElementById('loading').style.display = 'none';
  if (user) {
    currentUser = user;
    document.getElementById('auth-screen').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    const initials = user.displayName ? user.displayName.split(' ').map(n=>n[0]).join('').slice(0,2).toUpperCase() : 'U';
    const av = document.getElementById('user-avatar');
    if (user.photoURL) {
      av.innerHTML = `<img src="${user.photoURL}" alt="">`;
    } else {
      av.textContent = initials;
    }
    await loadState();
    renderAll();
    document.getElementById('calendar-view').style.display = 'block';
    document.getElementById('list-view').style.display = 'none';
  } else {
    currentUser = null;
    document.getElementById('auth-screen').style.display = 'flex';
    document.getElementById('app').style.display = 'none';
  }
});
</script>
</body>
